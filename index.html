<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Algorithm Visualizer</title>
    <link rel="stylesheet" href="style.css" />
</head>

<body>

    <div id="home-page">

        <header class="hero">
            <h1>Algorithm Visualizer</h1>
            <p class="subtitle">Understand algorithms through interactive visualizations.</p>
        </header>
        <div class="algorithm-grid">
            <div class="algorithm-card bubble" data-algorithm="bubble">
                <div class="algorithm-content">

                    <h2 class="algorithm-title">
                        <span>Bubble</span>
                        <span>Sort</span>
                    </h2>

                    <p class="explore">
                        Explore →
                    </p>
                </div>
            </div>

            <div class="algorithm-card selection" data-algorithm="selection">
                <div class="algorithm-content">

                    <h2 class="algorithm-title">
                        <span>Selection</span>
                        <span>Sort</span>
                    </h2>

                    <p class="explore">
                        Explore →
                    </p>
                </div>
            </div>

            <div class="algorithm-card insertion" data-algorithm="insertion">
                <div class="algorithm-content">

                    <h2 class="algorithm-title">
                        <span>Insertion</span>
                        <span>Sort</span>
                    </h2>

                    <p class="explore">
                        Explore →
                    </p>
                </div>
            </div>

            <div class="algorithm-card merge" data-algorithm="merge">
                <div class="algorithm-content">

                    <h2 class="algorithm-title">
                        <span>Merge</span>
                        <span>Sort</span>
                    </h2>

                    <p class="explore">
                        Explore →
                    </p>
                </div>
            </div>

            <div class="algorithm-card quick" data-algorithm="quick">
                <div class="algorithm-content">

                    <h2 class="algorithm-title">
                        <span>Quick</span>
                        <span>Sort</span>
                    </h2>

                    <p class="explore">
                        Explore →
                    </p>
                </div>
            </div>

            <div class="algorithm-card compare-card compare ">
                <div class="algorithm-content">

                    <h2 class="algorithm-title">
                        Compare
                    </h2>

                    <p class="explore">
                        Coming Soon
                    </p>
                </div>
            </div>
        </div>
    </div>
    </div>

    <div id="visualizer-page">

    <button id="back-btn" class="back-btn">
        ← Back
    </button>

    <h1 id="current-algorithm" class="page-title">
        Bubble Sort
    </h1>

    <div class="controls">

        <div class="button-row">
            <button id="generate-btn">Generate New Array</button>
            <button id="play-btn">Play</button>
            <button id="pause-btn">Pause</button>
            <button id="resume-btn">Resume</button>
            <button id="reset-btn">Reset</button>
            <button id="step-btn">Step</button>
        </div>

        <div class="slider-group">

            <div class="slider-item">
                <label>Speed</label>

                <input
                    type="range"
                    id="speed-slider"
                    min="1"
                    max="100"
                    value="50"
                />
            </div>

            <div class="slider-item">
                <label>Array Size</label>

                <input
                    type="range"
                    id="size-slider"
                    min="10"
                    max="80"
                    value="40"
                />

                <span id="size-value">40</span>
            </div>

        </div>

    </div>

    <div id="array-container"></div>

</div>

    <script type="module" src="main.js"></script>
</body>

</html>
